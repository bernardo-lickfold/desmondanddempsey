<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Page — Desmond &amp; Dempsey</title>
  <style>
    :root { --bg:#f5f5f2; --ink:#140803; }
    * { box-sizing:border-box; margin:0; }
    html,body { height:100%; }
    body {
      background:var(--bg); color:var(--ink);
      font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:100vh; text-align:center; padding:40px; gap:20px;
    }
    h1 { font-family:Georgia,"Times New Roman",serif; font-weight:300; font-size:32px; line-height:1.15; }
    p { font-size:11px; letter-spacing:.04em; text-transform:uppercase; opacity:.5; }
    a { color:inherit; font-size:11px; letter-spacing:.04em; text-transform:uppercase; text-decoration:none; border-bottom:0.5px solid rgba(20,8,3,.3); padding-bottom:2px; }
  </style>
</head>
<body>
  <h1>Product Page</h1>
  <p>Coming soon</p>
  <a href="../homepage/">← Home</a>
</body>
</html>
